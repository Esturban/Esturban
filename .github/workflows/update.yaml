name: update

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🍽️ Get working copy
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: ☕ Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: update/go.mod
          cache-dependency-path: update/go.sum

      - name: 🍳 Render profile
        run: |
          cd ${GITHUB_WORKSPACE}/update/
          go run .

      - name: 🚀 Commit changes if needed
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git add README.md update/ai_radar_state.json
          if git diff --cached --quiet; then
            echo "No README or AI Radar changes to commit."
            exit 0
          fi
          git commit -m "chore: update profile radar"
          git push
